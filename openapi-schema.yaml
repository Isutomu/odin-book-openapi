openapi: 3.1.0
info:
  version: 1.0.0
  title: odinbook API
  contact:
    name: Isutomu Naruto
    email: isutomu@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
tags:
  - name: auth
    description: Authentication and authorization operations.
servers:
  - url: http://localhost:5173
    description: Localhost Development Server
  - url: https://odin-book-backend-top-production.up.railway.app
    description: Production Server
paths:
  /auth/signup:
    post:
      summary: Signup an user
      operationId: signup
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "201":
          description: Created User
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
          headers:
            Set-Cookie:
              schema:
                type: string
                example: connect.sid=abcde12345; Path=/; Expires=Wed, 01 Apr 1990 20:20:20 GMT;
                  HttpOnly
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "422":
          description: Unprocessable Content
          content:
            application/json:
              schema:
                $ref: "#/paths/~1auth~1signup/post/responses/409/content/application~1json/sche\
                  ma"
        "500":
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: "#/paths/~1auth~1signup/post/responses/409/content/application~1json/sche\
                  ma"
  /auth/login:
    post:
      summary: Login an user
      operationId: login
      tags:
        - auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  $ref: "#/paths/~1auth~1signup/post/requestBody/content/application~1json/schema\
                    /properties/username"
                password:
                  $ref: "#/paths/~1auth~1signup/post/requestBody/content/application~1json/schema\
                    /properties/password"
      responses:
        "200":
          description: Logged in user
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
          headers:
            Set-Cookie:
              schema:
                type: string
                example: connect.sid=abcde12345; Path=/; Expires=Wed, 01 Apr 1990 20:20:20 GMT;
                  HttpOnly
        "422":
          $ref: "#/paths/~1auth~1signup/post/responses/422"
        "500":
          $ref: "#/paths/~1auth~1signup/post/responses/500"
  /auth/verify-session:
    get:
      summary: Verify is user session is valid
      operationId: verify-session
      tags:
        - auth
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Session is valid
          content:
            application/json:
              schema:
                type: object
                required:
                  - message
                properties:
                  message:
                    type: string
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/paths/~1auth~1signup/post/responses/409/content/application~1json/sche\
                  ma"
        "500":
          $ref: "#/paths/~1auth~1signup/post/responses/500"
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: connect.sid
