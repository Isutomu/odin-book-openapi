type: object
required:
  - id
  - content
  - publishedAt
  - updatedAt
  - author
properties:
  id:
    type: string
    format: uuid
  content:
    type: string
  publishedAt:
    type: string
    format: date-time
  updatedAt:
    oneOf:
      - type: string
        format: date-time
      - type: 'null'
  author:
    type: object
    required:
      - username
    properties:
      username:
        type: string
