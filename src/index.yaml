openapi:  '3.1.0'
info:
  version: 1.0.0
  title: odinbook API
  contact:
    name: Isutomu Naruto
    email: isutomu@gmail.com
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html

tags:
  - name: auth
    description: Authentication and authorization operations.
  - name: post
    description: CRUD operations with post(s).

servers:
  - url: http://localhost:5173
    description: Localhost Development Server
  - url: 'https://odin-book-backend-top-production.up.railway.app'
    description: Production Server

paths:
  /auth/signup:
    $ref: './paths/auth/signup.yaml'
  /auth/login:
    $ref: './paths/auth/login.yaml'
  /auth/verify-session:
    $ref: './paths/auth/verify-session.yaml'
  /post/create:
    $ref: './paths/post/create.yaml'
  /post/delete/{postId}:
    $ref: './paths/post/delete_RPpostId.yaml'
  /post/update/{postId}:
    $ref: './paths/post/update_RPpostId.yaml'
  /post/feed:
    $ref: './paths/post/feed.yaml'
  /post/feed/pagination/{lastPostId}:
    $ref: './paths/post/feed_pagination_RPlastPostId.yaml'
  /post/read/{postId}:
    $ref: './paths/post/read_RPpostId.yaml'
  /post/read-all/{username}:
    $ref: './paths/post/read-all_RPusername.yaml'
  /post/read-all/{username}/pagination/{lastPostId}:
    $ref: './paths/post/read-all_pagination_RPusername.yaml'

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: 'connect.sid'