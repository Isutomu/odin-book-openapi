post:
  summary: Create a post
  operationId: createPost
  tags:
    - post
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - 'content'
          properties:
            content:
              $ref: '../../components/schemas/Content.yaml'
  responses:
    '201':
      description: Created post
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
    '422':
      $ref: '../../components/responses/422UnprocessableContent.yaml'
    '500':
      $ref: '../../components/responses/500InternalServerError.yaml'
