get:
  summary: Get a post
  operationId: getPost
  tags:
    - post
  parameters:
    - in: path
      name: postId
      schema:
        type: string
      required: true
      description:  ID of the post
  responses:
    '200':
      description: Got post
      content:
        application/json:
          schema:
            type: object
            required:
              - message
              - data
            properties:
              message:
                type: string
              data:
                $ref: '../../components/schemas/Post.yaml'
    '404':
      $ref: '../../components/responses/404NotFound.yaml'
    '500':
      $ref: '../../components/responses/500InternalServerError.yaml'
