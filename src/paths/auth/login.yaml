post:
  tags:
    - Auth
  summary: Login
  description: Login an user and set a cookie.
  operationId: login
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              $ref: '../components/schemas/Username.yaml'
            password:
              $ref: '../components/schemas/Password.yaml'
    required: true
  responses:
    '200':
      description: >
        Successfully authenticated.
        The session ID is returned in a cookie, on property `connect.sid`. You need to include this cookie in subsequent requests.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                description: Success message
                type: string
      headers:
        Set-Cookie:
          schema:
            type: string
            example: 'connect.sid=abcde12345; Path=/; Expires=Wed, 01 Apr 1990 20:20:20 GMT; HttpOnly'
    '422':
      $ref: "../components/responses/422UnprocessableContent.yaml"
    '500':
      $ref: "../components/responses/500InternalServerError.yaml"

