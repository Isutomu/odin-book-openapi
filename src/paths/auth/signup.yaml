post:
  tags:
    - Auth
  summary: Signup
  description: Register a new user.
  operationId: signup
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            username:
              $ref: '../components/schemas/Username.yaml'
            password:
              $ref: '../components/schemas/Password.yaml'
    required: true
  responses:
    '201':
      description: Successfully registered.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                description: Success message
                type: string
    '409':
      $ref: "../components/responses/409Conflict.yaml"
    '422':
      $ref: "../components/responses/422UnprocessableContent.yaml"
    '500':
      $ref: "../components/responses/500InternalServerError.yaml"

