post:
  summary: Signup an user
  operationId: signup
  tags:
    - auth
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - 'username'
            - 'password'
          properties:
            username:
              $ref: '../../components/schemas/Username.yaml'
            password:
              $ref: '../../components/schemas/Password.yaml'
  responses:
    '201':
      description: Created User
      content:
        application/json:
          schema:
            type: object
            required:
              - message
            properties:
              message:
                type: string
      headers:
        Set-Cookie:
          schema:
            type: string
            example: 'connect.sid=abcde12345; Path=/; Expires=Wed, 01 Apr 1990 20:20:20 GMT; HttpOnly'
    '409':
      $ref: '../../components/responses/409Conflict.yaml'
    '422':
      $ref: '../../components/responses/422UnprocessableContent.yaml'
    '500':
      $ref: '../../components/responses/500InternalServerError.yaml'
